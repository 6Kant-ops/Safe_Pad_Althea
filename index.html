<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<!-- iPad Zoom verhindern -->
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Notfallsystem</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    transition:0.3s;
    touch-action:manipulation;
}

.container{
    width:340px;
    text-align:center;
}

h1{
    font-size:28px;
    margin-bottom:20px;
    letter-spacing:2px;
}

.display{
    width:100%;
    height:70px;
    border:none;
    border-radius:12px;
    margin-bottom:20px;
    background:#222;
    color:white;
    text-align:center;
    font-size:32px;
    letter-spacing:10px;
    touch-action:manipulation;
}

.pad{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
}

button{
    height:80px;
    border:none;
    border-radius:12px;
    background:#333;
    color:white;
    font-size:30px;
    cursor:pointer;
    touch-action:manipulation;
}

button:active{
    background:#666;
}

.message{
    position:absolute;
    width:100%;
    text-align:center;
    top:40%;
    display:none;
    padding:20px;
}

.message h2{
    font-size:40px;
    margin-bottom:20px;
}

.countdown{
    font-size:80px;
    font-weight:bold;
}

.hidden{
    display:none!important;
}

</style>
</head>

<body>

<div class="container" id="container">

    <h1>NOTFALLSYSTEM AKTIVIEREN</h1>

    <input type="text" id="display" class="display" readonly>

    <div class="pad">

        <button onclick="addDigit('1')">1</button>
        <button onclick="addDigit('2')">2</button>
        <button onclick="addDigit('3')">3</button>

        <button onclick="addDigit('4')">4</button>
        <button onclick="addDigit('5')">5</button>
        <button onclick="addDigit('6')">6</button>

        <button onclick="addDigit('7')">7</button>
        <button onclick="addDigit('8')">8</button>
        <button onclick="addDigit('9')">9</button>

        <button onclick="clearCode()">C</button>
        <button onclick="addDigit('0')">0</button>
        <button onclick="checkCode()">OK</button>

    </div>

</div>

<div class="message" id="message">

    <h2>
        CODE EINGABE KORREKT<br>
        SIE HABEN 10 SEK DEN RAUM ZU VERLASSEN
    </h2>

    <div class="countdown" id="countdown">
        10
    </div>

</div>

<!-- AUDIO -->
<audio id="successAudio" src="alarm.mp3"></audio>

<script>

const validCodes = [

    "4827",
    "9153",
    "6408",
    "2719",
    "5831",

    "7462",
    "1984",
    "3507",
    "8246",
    "6175",

    "4392",
    "7601",
    "2854",
    "9316",
    "5478"

];

let realCode = "";
let locked = false;

const display = document.getElementById("display");
const container = document.getElementById("container");
const message = document.getElementById("message");
const countdownEl = document.getElementById("countdown");

function addDigit(digit){

    if(locked) return;

    if(realCode.length < 4){

        realCode += digit;

        display.value = "*".repeat(realCode.length);

    }

}

function clearCode(){

    if(locked) return;

    realCode = "";
    display.value = "";

}

function checkCode(){

    if(locked) return;

    if(realCode.length !== 4) return;

    if(validCodes.includes(realCode)){

        successSequence();

    }else{

        locked = true;

        document.body.style.background = "red";

        setTimeout(resetSystem, 1500);

    }

}

function successSequence(){

    locked = true;

    document.body.style.background = "green";

    playSound();

    container.classList.add("hidden");

    message.style.display = "block";

    let time = 10;

    countdownEl.textContent = time;

    setTimeout(() => {

        const interval = setInterval(() => {

            time--;

            countdownEl.textContent = time;

            if(time <= 0){

                clearInterval(interval);

                setTimeout(resetSystem, 1000);

            }

        }, 1000);

    }, 2000);

}

function resetSystem(){

    realCode = "";

    locked = false;

    display.value = "";

    container.classList.remove("hidden");

    message.style.display = "none";

    countdownEl.textContent = "10";

    document.body.style.background = "#111";

}

function playSound(){

    const audio = document.getElementById("successAudio");

    audio.pause();

    audio.currentTime = 0;

    audio.volume = 1.0;

    audio.play();

}

</script>

</body>
</html>
